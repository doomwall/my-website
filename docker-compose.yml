services:
  backend:
    build:
      context: ./website-backend
    container_name: website-backend
    env_file:
      - ./website-backend/.env
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - web

  frontend:
    build:
      context: ./website-frontend
    container_name: website-frontend
    depends_on:
      - backend
    environment:
      PORT: 80
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge
