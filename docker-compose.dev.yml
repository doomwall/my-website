services:
  backend:
    image: python:3.13-alpine
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 3000 --reload"
    volumes:
      - ./website-backend:/app
    ports:
      - "3000:3000"
    environment:
      CORS_ORIGIN: http://localhost:5173

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./website-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:3000
